<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorFiterapia | Salud y Bienestar</title>
    
    <style>
        :root {
            --azul: #0073cf;
            --rojo: #e31e24;
            --blanco: #ffffff;
            --gris: #f4f4f4;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--gris);
        }

        /* BARRA DE NAVEGACIÓN */
        .navbar {
            background-color: var(--blanco);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* AJUSTE DEL LOGO */
        .logo-img {
            height: 80px; /* Tamaño ideal */
            width: auto;
            display: block;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--azul);
            font-weight: bold;
        }

        .btn-cita {
            background-color: var(--rojo);
            color: white !important;
            padding: 10px 20px;
            border-radius: 20px;
        }

        /* SECCIÓN HERO */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background-color: var(--blanco);
        }

        .hero h1 {
            color: var(--azul);
            font-size: 2.5rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">
            <img src="Logo%20CorFiterapia%20_Trasparente.png" alt="CorFiterapia" class="logo-img">
        </a>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#" class="btn-cita">Agendar Cita</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Bienvenido a CorFiterapia</h1>
        <p>Tu salud en las mejores manos.</p>
    </header>

</body>
</html>
